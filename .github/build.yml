name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:         # allow manual trigger from GitHub UI

permissions:
  contents: write            # needed to create GitHub Releases

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Windows EXE  (runs on GitHub-hosted Windows runner — no Wine needed)
  # ────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller ImageConverterPro.spec `
            --distpath dist/windows `
            --workpath build/windows `
            --noconfirm

      - name: Zip the EXE
        run: |
          Compress-Archive `
            -Path dist/windows/ImageConverterPro.exe `
            -DestinationPath dist/ImageConverterPro-Windows-x64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageConverterPro-Windows
          path: dist/ImageConverterPro-Windows-x64.zip

  # ────────────────────────────────────────────────────────────────────
  # Linux binary  (Docker-based build)
  # ────────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux Binary (Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Linux binary inside Docker
        run: |
          mkdir -p dist/linux
          docker build --target linux-build -t imgconv-builder .
          docker run --rm -v "$PWD/dist/linux":/out imgconv-builder

      - name: Tar the Linux binary
        run: |
          tar -czf dist/ImageConverterPro-Linux-x64.tar.gz \
            -C dist/linux ImageConverterPro

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageConverterPro-Linux
          path: dist/ImageConverterPro-Linux-x64.tar.gz

  # ────────────────────────────────────────────────────────────────────
  # macOS binary
  # ────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS Binary
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS binary
        run: |
          pyinstaller ImageConverterPro.spec \
            --distpath dist/macos \
            --workpath build/macos \
            --noconfirm

      - name: Zip macOS binary
        run: |
          zip -j dist/ImageConverterPro-macOS-x64.zip \
            dist/macos/ImageConverterPro

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageConverterPro-macOS
          path: dist/ImageConverterPro-macOS-x64.zip

  # ────────────────────────────────────────────────────────────────────
  # GitHub Release  (only on version tag push)
  # ────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Image Converter Pro ${{ github.ref_name }}"
          body: |
            ## Image Converter Pro ${{ github.ref_name }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows 10/11 (x64) | `ImageConverterPro-Windows-x64.zip` |
            | Linux (x64) | `ImageConverterPro-Linux-x64.tar.gz` |
            | macOS (x64) | `ImageConverterPro-macOS-x64.zip` |

            ### Features
            - Convert between PNG, JPEG, WEBP, BMP, TIFF, GIF, APNG, ICO, AVIF, TGA
            - Resize with aspect-ratio lock
            - Full alpha channel support
            - Animated GIF / WEBP / APNG conversion
            - Sequence → individual frames extraction
            - Individual frames → animation assembly
          draft: false
          prerelease: false
          files: |
            release-assets/**/*.zip
            release-assets/**/*.tar.gz
