name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ── Windows EXE ────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: pyinstaller ImageConverterPro.spec --distpath dist/windows --workpath build/windows --noconfirm

      - name: Zip EXE
        run: Compress-Archive -Path dist/windows/ImageConverterPro.exe -DestinationPath dist/ImageConverterPro-Windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageConverterPro-Windows
          path: dist/ImageConverterPro-Windows-x64.zip

  # ── Linux binary (PyInstaller 직접 빌드) ───────────────────────────────────
  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk tk-dev libavif-dev

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary
        run: |
          pyinstaller ImageConverterPro.spec \
            --distpath dist/linux \
            --workpath build/linux \
            --noconfirm

      - name: Verify binary exists
        run: ls -lh dist/linux/

      - name: Tar binary
        run: tar -czf dist/ImageConverterPro-Linux-x64.tar.gz -C dist/linux ImageConverterPro

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageConverterPro-Linux
          path: dist/ImageConverterPro-Linux-x64.tar.gz

  # ── macOS .app + DMG ───────────────────────────────────────────────────────
  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build .app bundle
        run: |
          pyinstaller ImageConverterPro.spec \
            --distpath dist/macos \
            --workpath build/macos \
            --noconfirm

      - name: Package as DMG
        run: |
          if [ -d "dist/macos/ImageConverterPro.app" ]; then
            create-dmg \
              --volname "Image Converter Pro" \
              --window-size 500 300 \
              --app-drop-link 350 150 \
              dist/ImageConverterPro-macOS.dmg \
              dist/macos/ImageConverterPro.app || \
            zip -r dist/ImageConverterPro-macOS.dmg.zip dist/macos/ImageConverterPro.app
          else
            zip -j dist/ImageConverterPro-macOS.dmg dist/macos/ImageConverterPro
            mv dist/ImageConverterPro-macOS.dmg dist/ImageConverterPro-macOS-binary.zip
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageConverterPro-macOS
          path: dist/ImageConverterPro-macOS*

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Image Converter Pro ${{ github.ref_name }}"
          body: |
            ## Image Converter Pro ${{ github.ref_name }}

            | Platform | File |
            |----------|------|
            | Windows 10/11 (x64) | `ImageConverterPro-Windows-x64.zip` |
            | Linux (x64) | `ImageConverterPro-Linux-x64.tar.gz` |
            | macOS | `ImageConverterPro-macOS.dmg` |
          draft: false
          prerelease: false
          files: |
            release-assets/**/*.zip
            release-assets/**/*.tar.gz
            release-assets/**/*.dmg
